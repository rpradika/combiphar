; Compiled-script cache for artisan serve — cuts per-request PHP compile cost.
; validate_timestamps=1 keeps the "PHP changes are live" dev loop (edits show
; up within revalidate_freq seconds). freq=2 instead of 0 because stat()ing
; ~1200 files per request is expensive on the Windows bind mount.
opcache.enable=1
opcache.enable_cli=1
opcache.memory_consumption=192
opcache.max_accelerated_files=20000
opcache.validate_timestamps=1
opcache.revalidate_freq=2
